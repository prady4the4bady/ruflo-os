[mypy]
python_version = 3.12
mypy_path = prady-trader
ignore_missing_imports = True
disallow_untyped_defs = False
check_untyped_defs = False
warn_return_any = False
warn_unused_ignores = False
no_implicit_optional = False
follow_imports = silent

[mypy-binance.*]
ignore_missing_imports = True

[mypy-plotly.*]
ignore_missing_imports = True

[mypy-sklearn.*]
ignore_missing_imports = True

[mypy-pandas_ta.*]
ignore_missing_imports = True

[mypy-pandas.*]
ignore_missing_imports = True

[mypy-xgboost.*]
ignore_missing_imports = True

[mypy-torch.*]
ignore_missing_imports = True

[mypy-redis.*]
ignore_missing_imports = True

[mypy-aiohttp.*]
ignore_missing_imports = True

[mypy-tenacity.*]
ignore_missing_imports = True
