services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ruflo
      POSTGRES_USER: ruflo
      POSTGRES_PASSWORD: ruflo_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ruflo"]
      interval: 5s
      timeout: 3s
      retries: 5

  control-plane:
    build: .
    ports:
      - "9000:9000"
    environment:
      DATABASE_URL: postgresql+asyncpg://ruflo:ruflo_dev@postgres:5432/ruflo
      MODEL_GATEWAY_URL: http://model-gateway:8100
      LOG_LEVEL: debug
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
