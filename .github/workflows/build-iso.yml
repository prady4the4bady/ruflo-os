name: Build NemOS ISO

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-iso:
    runs-on: ubuntu-latest
    container: debian:bookworm
    timeout-minutes: 120
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        path: ruflo-os
    
    - name: Install dependencies
      run: |
        apt-get update
        apt-get install -y live-build wget xorriso curl debootstrap
    
    - name: Build ISO
      working-directory: ${{ github.workspace }}/ruflo-os/distro/live-build
      run: |
        mkdir -p /tmp/ruflo-os-build
        cd /tmp/ruflo-os-build
        lb config \
          --distribution bookworm \
          --archive-areas "main contrib non-free non-free-firmware" \
          --architectures amd64 \
          --binary-images iso-hybrid \
          --bootappend-live "boot=live components username=ruflo" \
          --debian-installer live \
          --iso-application "Ruflo OS" \
          --iso-volume "RUFLO_OS" \
          --linux-flavours amd64 \
          --linux-packages "linux-image-amd64" \
          --mode debian \
          --system live \
          --apt-recommends false \
          --security false
        
        mkdir -p config/package-lists
        cp ${{ github.workspace }}/ruflo-os/distro/packages/base.list config/package-lists/base.list.chroot
        cp ${{ github.workspace }}/ruflo-os/distro/packages/desktop.list config/package-lists/desktop.list.chroot\
        cp ${{ github.workspace }}/ruflo-os/distro/packages/ai-runtime.list config/package-lists/ai-runtime.list.chroot
        
        mkdir -p config/hooks/normal
        cat > config/hooks/normal/0100-ruflo-setup.hook.chroot << 'HOOK'
        #!/bin/bash
        set -e
        useradd --system --home-dir /opt/ruflo --shell /usr/sbin/nologin ruflo || true
        mkdir -p /opt/ruflo /var/lib/ruflo /etc/ruflo
        chown -R ruflo:ruflo /opt/ruflo /var/lib/ruflo
        python3 -m venv /opt/ruflo/venv
        HOOK
        chmod +x config/hooks/normal/0100-ruflo-setup.hook.chroot
        
        if [ -f ../../ruflo-os/distro/live-build/hooks/0200-ruflo-install.hook.chroot ]; then
          cp ../../ruflo-os/distro/live-build/hooks/0200-ruflo-install.hook.chroot config/hooks/normal/
          chmod +x config/hooks/normal/0200-ruflo-install.hook.chroot
        fi
        
        mkdir -p config/includes.chroot/etc/systemd/system
        cp ../../ruflo-os/distro/systemd/*.service config/includes.chroot/etc/systemd/system/ || true
        
        mkdir -p config/includes.chroot/etc/calamares
        cp -r ../../ruflo-os/distro/calamares/* config/includes.chroot/etc/calamares/ || true
        
        lb build 2>&1 | tee build.log
        
        if [ -f live-image-amd64.hybrid.iso ]; then
          mv live-image-amd64.hybrid.iso /tmp/ruflo-os-${{ github.sha }}-amd64.iso
        else
          tail -50 build.log
          exit 1
        fi
    
    - name: Upload ISO
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: ruflo-os-iso
        path: /tmp/ruflo-os-*-amd64.iso
        retention-days: 30
    
    - name: Upload log
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-log-${{ github.sha }}
        path: ruflo-os/distro/live-build/build.log
        retention-days: 7
